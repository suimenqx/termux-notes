site_name: termux-notes
site_description: Notes and practical learnings from tinkering in Termux on Android
site_url: https://suimenqx.github.io/termux-notes/
repo_url: https://github.com/suimenqx/termux-notes
repo_name: suimenqx/termux-notes

theme:
  name: material
  language: zh
  font:
    text: Noto Sans SC
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: teal
      accent: blue
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight

# Reuse existing notes as the docs source.
docs_dir: notes
extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Termux 下载源优化方案与使用指南: 2026-02-28-termux-mirror-optimizer-guide.md
  - Termux 下 GH 与 SSH Agent 配置: 2026-02-27-gh-and-ssh-agent.md
  - GH Pages Long-term Playbook: 2026-02-27-gh-pages-long-term-blog-playbook.md

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - toc:
      permalink: true
